<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — RH Inteligente</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        .admin-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ── Sobrescreve overflow do style.css global ── */
        html, body { height: auto; min-height: 100%; overflow: auto; }

        /* ── Login card ── */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .login-card h2 { font-size: 1.2rem; font-weight: 700; }
        .login-card p  { font-size: 0.8rem; color: var(--text-sub); margin-top: -0.75rem; }

        .field { display: flex; flex-direction: column; gap: 0.4rem; }
        .field label { font-size: 0.78rem; color: var(--text-sub); font-weight: 500; }
        .field input {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.875rem;
            padding: 0.6rem 0.85rem;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus { border-color: var(--violet); }

        .btn-primary {
            background: var(--grad);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.7rem;
            transition: opacity .15s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: var(--radius-sm);
            color: #f87171;
            font-size: 0.8rem;
            padding: 0.5rem 0.75rem;
            display: none;
        }

        /* ── Panel ── */
        .admin-panel {
            display: none;
            width: 100%;
            max-width: 960px;
            flex-direction: column;
            gap: 1.5rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .panel-header h2 { font-size: 1.25rem; font-weight: 700; }
        .panel-meta { font-size: 0.78rem; color: var(--text-sub); }

        .btn-secondary {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-sub);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.45rem 1rem;
            transition: border-color .2s, color .2s;
        }
        .btn-secondary:hover { border-color: var(--violet); color: var(--text); }

        .questions-table {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        thead { background: var(--card); }
        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text-muted);
        }
        td { padding: 0.75rem 1rem; border-top: 1px solid var(--border); vertical-align: top; }
        tr:hover td { background: var(--card); }

        .badge-freq {
            background: rgba(124,58,237,.18);
            border: 1px solid rgba(124,58,237,.3);
            color: #a78bfa;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.1rem 0.55rem;
        }
        .badge-reviewed {
            background: rgba(34,197,94,.12);
            border: 1px solid rgba(34,197,94,.25);
            color: #4ade80;
            border-radius: 99px;
            font-size: 0.7rem;
            padding: 0.1rem 0.55rem;
        }
        .badge-pending {
            background: rgba(251,191,36,.1);
            border: 1px solid rgba(251,191,36,.25);
            color: #fbbf24;
            border-radius: 99px;
            font-size: 0.7rem;
            padding: 0.1rem 0.55rem;
        }
        .review-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 0.72rem;
            padding: 0.2rem 0.6rem;
            transition: all .15s;
        }
        .review-btn:hover { border-color: #4ade80; color: #4ade80; }

        .delete-btn {
            background: none;
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.72rem;
            padding: 0.2rem 0.5rem;
            transition: all .15s;
            margin-left: 0.25rem;
        }
        .delete-btn:hover { border-color: #f87171; color: #f87171; }

        .btn-danger {
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: var(--radius-sm);
            color: #f87171;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.45rem 1rem;
            transition: opacity .15s;
        }
        .btn-danger:hover { opacity: 0.8; }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .back-link {
            color: var(--text-sub);
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color .15s;
        }
        .back-link:hover { color: var(--text); }

        /* ── Charts ── */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .chart-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text-muted);
        }
        .chart-wrap {
            position: relative;
            width: 100%;
        }
        .chart-wrap-donut {
            max-width: 200px;
            margin: 0 auto;
        }
        .stats-pills {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
        }
        .stat-pill-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .stat-pill-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .pill-green { color: #4ade80; }
        .pill-red   { color: #f87171; }
        .pill-violet{ color: #a78bfa; }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-top"></div>
    <div class="bg-glow bg-glow-bottom"></div>

    <div class="admin-wrap">

        <!-- Login -->
        <div class="login-card" id="loginCard">
            <div>
                <h2>🔐 Painel Admin</h2>
                <p>Acesso restrito — equipe de RH</p>
            </div>
            <div class="field">
                <label>Usuário</label>
                <input type="text" id="inputUser" value="admin" autocomplete="username">
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" id="inputPass" placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="error-msg" id="errorMsg">Usuário ou senha incorretos.</div>
            <button class="btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
        </div>

        <!-- Painel -->
        <div class="admin-panel" id="adminPanel">
            <div class="panel-header">
                <div>
                    <a class="back-link" href="/">← Voltar ao chat</a>
                    <h2 style="margin-top:0.5rem">Perguntas sem resposta</h2>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap">
                    <span class="panel-meta" id="panelMeta"></span>
                    <button class="btn-secondary" onclick="loadStats(); loadQuestions()">↺ Atualizar</button>
                    <button class="btn-danger" onclick="clearAll()">🗑 Apagar todas</button>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-row">
                <div class="chart-card">
                    <div class="chart-title">Reconhecimento de Perguntas</div>
                    <div class="chart-wrap chart-wrap-donut">
                        <canvas id="donutChart"></canvas>
                    </div>
                    <div class="stats-pills">
                        <div class="stat-pill">
                            <span class="stat-pill-value pill-green" id="statRespondidas">—</span>
                            <span class="stat-pill-label">Respondidas</span>
                        </div>
                        <div class="stat-pill">
                            <span class="stat-pill-value pill-red" id="statSemResposta">—</span>
                            <span class="stat-pill-label">Sem resposta</span>
                        </div>
                        <div class="stat-pill">
                            <span class="stat-pill-value pill-violet" id="statTotal">—</span>
                            <span class="stat-pill-label">Total</span>
                        </div>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Atividade — Últimos 7 Dias</div>
                    <div class="chart-wrap">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="questions-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Pergunta</th>
                            <th>Usuário</th>
                            <th>Data</th>
                            <th style="text-align:center">Freq.</th>
                            <th style="text-align:center">Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none">
                    Nenhuma pergunta sem resposta registrada ainda.
                </div>
            </div>
        </div>

    </div>

    <script>
        let _credentials = '';
        let _donutChart = null;
        let _barChart   = null;

        function authHeader() {
            return 'Basic ' + btoa(_credentials);
        }

        async function doLogin() {
            const user = document.getElementById('inputUser').value.trim();
            const pass = document.getElementById('inputPass').value;
            const btn  = document.getElementById('loginBtn');
            const err  = document.getElementById('errorMsg');

            if (!user || !pass) return;

            btn.disabled = true;
            btn.textContent = 'Verificando...';
            err.style.display = 'none';

            _credentials = user + ':' + pass;

            try {
                const res = await fetch('/admin/unanswered?limit=1', {
                    headers: { 'Authorization': authHeader() }
                });

                if (res.status === 401) {
                    err.style.display = 'block';
                    _credentials = '';
                } else {
                    document.getElementById('loginCard').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'flex';
                    loadStats();
                    loadQuestions();
                }
            } catch {
                err.textContent = 'Erro de conexão.';
                err.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Entrar';
        }

        async function loadStats() {
            const res  = await fetch('/admin/stats', { headers: { 'Authorization': authHeader() } });
            const data = await res.json();

            document.getElementById('statRespondidas').textContent  = data.total_respondidas;
            document.getElementById('statSemResposta').textContent  = data.total_sem_resposta;
            document.getElementById('statTotal').textContent        = data.total_mensagens;

            renderDonut(data.total_respondidas, data.total_sem_resposta);
            renderBarChart(data.msgs_por_dia, data.unanswered_por_dia);
        }

        function renderDonut(respondidas, semResposta) {
            const ctx = document.getElementById('donutChart').getContext('2d');
            if (_donutChart) _donutChart.destroy();

            const total = respondidas + semResposta;
            const pct   = total > 0 ? Math.round((respondidas / total) * 100) : 0;

            _donutChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Respondidas', 'Sem resposta'],
                    datasets: [{
                        data: [respondidas || 0, semResposta || 0],
                        backgroundColor: ['rgba(74,222,128,.8)', 'rgba(248,113,113,.8)'],
                        borderColor:     ['rgba(74,222,128,1)',  'rgba(248,113,113,1)'],
                        borderWidth: 1.5,
                        hoverOffset: 6,
                    }],
                },
                options: {
                    cutout: '72%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => ` ${ctx.label}: ${ctx.parsed} (${total > 0 ? Math.round((ctx.parsed/total)*100) : 0}%)`,
                            },
                            bodyColor: '#e2e8f0',
                            backgroundColor: '#191d36',
                            borderColor: 'rgba(255,255,255,0.07)',
                            borderWidth: 1,
                        },
                    },
                },
                plugins: [{
                    id: 'centerText',
                    beforeDraw(chart) {
                        const { ctx, chartArea: { left, top, right, bottom } } = chart;
                        const cx = (left + right) / 2;
                        const cy = (top  + bottom) / 2;
                        ctx.save();
                        ctx.textAlign    = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle    = '#e2e8f0';
                        ctx.font         = 'bold 1.4rem Inter, sans-serif';
                        ctx.fillText(pct + '%', cx, cy - 8);
                        ctx.font         = '0.6rem Inter, sans-serif';
                        ctx.fillStyle    = '#4a5568';
                        ctx.fillText('acurácia', cx, cy + 12);
                        ctx.restore();
                    },
                }],
            });
        }

        function renderBarChart(msgsPorDia, unansweredPorDia) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (_barChart) _barChart.destroy();

            // Gera rótulos dos últimos 7 dias
            const labels = [];
            const mapTotal  = {};
            const mapUnans  = {};
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }));
                mapTotal[key] = 0;
                mapUnans[key] = 0;
            }

            // Preenche com dados reais
            const allKeys = Object.keys(mapTotal);
            msgsPorDia.forEach(r      => { if (mapTotal[r.dia] !== undefined) mapTotal[r.dia] = r.total; });
            unansweredPorDia.forEach(r => { if (mapUnans[r.dia] !== undefined) mapUnans[r.dia] = r.total; });

            const totalData = allKeys.map(k => mapTotal[k]);
            const unanswData = allKeys.map(k => mapUnans[k]);
            const answData   = allKeys.map((k, i) => Math.max(0, totalData[i] - unanswData[i]));

            _barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Respondidas',
                            data: answData,
                            backgroundColor: 'rgba(74,222,128,.65)',
                            borderColor:     'rgba(74,222,128,1)',
                            borderWidth: 1.5,
                            borderRadius: 6,
                            borderSkipped: false,
                        },
                        {
                            label: 'Sem resposta',
                            data: unanswData,
                            backgroundColor: 'rgba(248,113,113,.65)',
                            borderColor:     'rgba(248,113,113,1)',
                            borderWidth: 1.5,
                            borderRadius: 6,
                            borderSkipped: false,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            stacked: false,
                            grid: { color: 'rgba(255,255,255,.04)' },
                            ticks: { color: '#4a5568', font: { size: 11 } },
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,.04)' },
                            ticks: { color: '#4a5568', font: { size: 11 }, precision: 0 },
                        },
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#94a3b8',
                                font: { size: 11 },
                                boxWidth: 12,
                                boxHeight: 12,
                                borderRadius: 3,
                                useBorderRadius: true,
                            },
                        },
                        tooltip: {
                            bodyColor: '#e2e8f0',
                            backgroundColor: '#191d36',
                            borderColor: 'rgba(255,255,255,0.07)',
                            borderWidth: 1,
                        },
                    },
                },
            });
        }

        async function loadQuestions() {
            const res = await fetch('/admin/unanswered?limit=100', {
                headers: { 'Authorization': authHeader() }
            });
            const data = await res.json();
            const body = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');
            const meta  = document.getElementById('panelMeta');

            meta.textContent = `${data.total} pergunta(s) registrada(s)`;
            body.innerHTML = '';

            if (data.total === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            data.perguntas.forEach((q, i) => {
                const dt = new Date(q.timestamp).toLocaleString('pt-BR');
                const reviewed = q.revisado === 1;
                body.innerHTML += `
                    <tr id="row-${q.id}">
                        <td style="color:var(--text-muted)">${i + 1}</td>
                        <td>${escHtml(q.pergunta)}</td>
                        <td style="color:var(--text-sub)">${escHtml(q.usuario)}</td>
                        <td style="color:var(--text-muted);white-space:nowrap">${dt}</td>
                        <td style="text-align:center">
                            <span class="badge-freq">${q.frequencia}×</span>
                        </td>
                        <td style="text-align:center">
                            ${reviewed
                                ? '<span class="badge-reviewed">Revisado</span>'
                                : '<span class="badge-pending">Pendente</span>'
                            }
                        </td>
                        <td style="white-space:nowrap">
                            ${!reviewed ? `<button class="review-btn" onclick="markReviewed(${q.id})">✓ Revisado</button>` : ''}
                            <button class="delete-btn" onclick="deleteQuestion(${q.id})" title="Apagar">✕</button>
                        </td>
                    </tr>`;
            });
        }

        async function markReviewed(id) {
            await fetch(`/admin/unanswered/${id}/reviewed`, {
                method: 'PATCH',
                headers: { 'Authorization': authHeader() }
            });
            loadQuestions();
        }

        async function deleteQuestion(id) {
            await fetch(`/admin/unanswered/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': authHeader() }
            });
            document.getElementById(`row-${id}`)?.remove();
            const remaining = document.querySelectorAll('#tableBody tr').length;
            document.getElementById('panelMeta').textContent = `${remaining} pergunta(s) registrada(s)`;
            if (remaining === 0) document.getElementById('emptyState').style.display = 'block';
        }

        async function clearAll() {
            if (!confirm('Apagar TODAS as perguntas sem resposta? Esta ação não pode ser desfeita.')) return;
            const res  = await fetch('/admin/unanswered?limit=200', { headers: { 'Authorization': authHeader() } });
            const data = await res.json();
            await Promise.all(data.perguntas.map(q =>
                fetch(`/admin/unanswered/${q.id}`, { method: 'DELETE', headers: { 'Authorization': authHeader() } })
            ));
            loadQuestions();
        }

        function escHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
